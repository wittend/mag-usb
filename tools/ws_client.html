<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>mag-usb WebSocket Monitor</title>
  <style>
    body { font-family: sans-serif; margin: 16px; }
    #log { white-space: pre-wrap; border: 1px solid #ccc; padding: 8px; height: 60vh; overflow: auto; }
  </style>
</head>
<body>
  <h1>mag-usb WebSocket Monitor</h1>
  <div id="status">connecting…</div>
  <div id="log"></div>
  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const ws = new WebSocket('ws://127.0.0.1:8765/');

    ws.onopen = () => status.textContent = 'connected';
    ws.onclose = () => status.textContent = 'closed';
    ws.onerror = () => status.textContent = 'error';
    ws.onmessage = (evt) => {
      log.textContent += evt.data + "\n";
      log.scrollTop = log.scrollHeight;
    };
  </script>
</body>
</html>
